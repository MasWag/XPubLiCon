name: Validate

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install mono-devel xsltproc -y

      - name: Validate the schema file
        run: mono-xmltool --validate-rnc ./schema.rnc

      - name: Validate the example XML file
        run: mono-xmltool --validate ./schema.rnc ./example/data.xml

      - name: Run XSLT regression tests
        run: ./tests/xslt-regression/run.sh
